spring:
  application:
    name: music-service

  datasource:
    url: jdbc:postgresql://localhost:5433/tuneflow_music_db
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        format_sql: true

server:
  port: 8084

management:
  endpoints:
    web:
      exposure:
        include: health,info

minio:
  url: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin

  buckets:
    artists: artists
    albums: albums
    tracks: tracks