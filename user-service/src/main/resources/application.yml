spring:
  application:
    name: user-service

  datasource:
    url: jdbc:postgresql://localhost:5433/tuneflow_user_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: user-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.tuneflow.user_service.event"
        spring.json.value.default.type: com.tuneflow.user_service.event.UserRegisteredEvent

server:
  port: 8083

management:
  endpoints:
    web:
      exposure:
        include: health,info

